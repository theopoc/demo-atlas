<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Atlas – Task Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .done-row { opacity: 0.55; }
    .badge-done { background: #bbf7d0; color: #166534; }
    .badge-todo { background: #fef9c3; color: #854d0e; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 shadow-sm">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center gap-3">
      <svg class="w-7 h-7 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16M4 12h16M4 17h10"/>
      </svg>
      <div>
        <h1 class="text-xl font-bold text-slate-900">Demo Atlas</h1>
        <p class="text-xs text-slate-400">Task Manager · MySQL + Atlas Migrations</p>
      </div>
      <div class="ml-auto flex items-center gap-2 text-xs text-slate-400">
        <span id="db-status" class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-slate-300"></span>
          Connexion…
        </span>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8 grid grid-cols-1 gap-8 lg:grid-cols-2">

    <!-- ── Utilisateurs ─────────────────────────────── -->
    <section class="space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold">Utilisateurs</h2>
        <span id="user-count" class="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-medium">–</span>
      </div>

      <!-- Formulaire créer utilisateur -->
      <form id="user-form" class="bg-white rounded-xl border border-slate-200 p-4 space-y-3 shadow-sm">
        <p class="text-xs font-medium text-slate-500 uppercase tracking-wide">Nouvel utilisateur</p>
        <input id="user-name" type="text" placeholder="Nom" required
          class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        <input id="user-email" type="email" placeholder="Email" required
          class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2 rounded-lg transition-colors">
          Créer
        </button>
      </form>

      <!-- Liste utilisateurs -->
      <div id="user-list" class="space-y-2"></div>
    </section>

    <!-- ── Tâches ────────────────────────────────────── -->
    <section class="space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold">Tâches</h2>
        <span id="task-count" class="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-medium">–</span>
      </div>

      <!-- Formulaire créer tâche -->
      <form id="task-form" class="bg-white rounded-xl border border-slate-200 p-4 space-y-3 shadow-sm">
        <p class="text-xs font-medium text-slate-500 uppercase tracking-wide">Nouvelle tâche</p>
        <select id="task-user" required
          class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white">
          <option value="">— Sélectionner un utilisateur —</option>
        </select>
        <input id="task-title" type="text" placeholder="Titre de la tâche" required
          class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2 rounded-lg transition-colors">
          Créer
        </button>
      </form>

      <!-- Liste tâches -->
      <div id="task-list" class="space-y-2"></div>
    </section>

  </main>

  <!-- Toast notification -->
  <div id="toast" class="fixed bottom-5 right-5 hidden z-50">
    <div class="bg-slate-900 text-white text-sm px-4 py-2.5 rounded-xl shadow-lg fade-in"></div>
  </div>

<script>
const API = '';

// ── Helpers ──────────────────────────────────────────────

function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.querySelector('div').textContent = msg;
  el.querySelector('div').className = `${ok ? 'bg-slate-900' : 'bg-red-600'} text-white text-sm px-4 py-2.5 rounded-xl shadow-lg fade-in`;
  el.classList.remove('hidden');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.add('hidden'), 2500);
}

async function api(path, opts = {}) {
  const r = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── Rendu Utilisateurs ───────────────────────────────────

function renderUsers(users) {
  document.getElementById('user-count').textContent = users.length;
  const select = document.getElementById('task-user');
  const prev = select.value;

  // Mettre à jour le select de la form tâche
  select.innerHTML = '<option value="">— Sélectionner un utilisateur —</option>';
  users.forEach(u => {
    const o = document.createElement('option');
    o.value = u.id;
    o.textContent = `${u.name} (${u.email})`;
    if (String(u.id) === prev) o.selected = true;
    select.appendChild(o);
  });

  const list = document.getElementById('user-list');
  if (users.length === 0) {
    list.innerHTML = '<p class="text-sm text-slate-400 text-center py-4">Aucun utilisateur encore.</p>';
    return;
  }
  list.innerHTML = users.map(u => `
    <div class="bg-white rounded-xl border border-slate-200 px-4 py-3 flex items-center gap-3 shadow-sm fade-in">
      <div class="w-9 h-9 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-semibold text-sm flex-shrink-0">
        ${u.name.charAt(0).toUpperCase()}
      </div>
      <div class="min-w-0">
        <p class="font-medium text-sm truncate">${esc(u.name)}</p>
        <p class="text-xs text-slate-400 truncate">${esc(u.email)}</p>
      </div>
      <span class="ml-auto text-xs text-slate-300">#${u.id}</span>
    </div>
  `).join('');
}

// ── Rendu Tâches ─────────────────────────────────────────

function renderTasks(tasks) {
  document.getElementById('task-count').textContent = tasks.length;
  const list = document.getElementById('task-list');
  if (tasks.length === 0) {
    list.innerHTML = '<p class="text-sm text-slate-400 text-center py-4">Aucune tâche encore.</p>';
    return;
  }
  list.innerHTML = tasks.map(t => `
    <div class="bg-white rounded-xl border border-slate-200 px-4 py-3 flex items-center gap-3 shadow-sm fade-in ${t.done ? 'done-row' : ''}">
      <button onclick="completeTask(${t.id})" title="Marquer comme terminée"
        class="w-5 h-5 flex-shrink-0 rounded-full border-2 ${t.done ? 'border-green-400 bg-green-400' : 'border-slate-300 hover:border-indigo-400'} transition-colors flex items-center justify-center">
        ${t.done ? '<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : ''}
      </button>
      <div class="min-w-0 flex-1">
        <p class="text-sm font-medium truncate ${t.done ? 'line-through text-slate-400' : ''}">${esc(t.title)}</p>
        <p class="text-xs text-slate-400">${esc(t.user_name)}</p>
      </div>
      <span class="text-xs px-2 py-0.5 rounded-full font-medium ${t.done ? 'badge-done' : 'badge-todo'}">
        ${t.done ? 'Terminée' : 'En cours'}
      </span>
    </div>
  `).join('');
}

// ── Chargement données ───────────────────────────────────

async function loadAll() {
  try {
    const [users, tasks] = await Promise.all([api('/users'), api('/tasks')]);
    renderUsers(users);
    renderTasks(tasks);
    setStatus(true);
  } catch (e) {
    setStatus(false);
  }
}

function setStatus(ok) {
  const el = document.getElementById('db-status');
  el.innerHTML = ok
    ? '<span class="w-2 h-2 rounded-full bg-green-400"></span> Connecté'
    : '<span class="w-2 h-2 rounded-full bg-red-400"></span> Hors ligne';
}

// ── Actions ──────────────────────────────────────────────

document.getElementById('user-form').addEventListener('submit', async e => {
  e.preventDefault();
  const name = document.getElementById('user-name').value.trim();
  const email = document.getElementById('user-email').value.trim();
  try {
    await api('/users', { method: 'POST', body: JSON.stringify({ name, email }) });
    e.target.reset();
    toast(`Utilisateur "${name}" créé`);
    loadAll();
  } catch {
    toast('Erreur lors de la création', false);
  }
});

document.getElementById('task-form').addEventListener('submit', async e => {
  e.preventDefault();
  const user_id = parseInt(document.getElementById('task-user').value);
  const title = document.getElementById('task-title').value.trim();
  try {
    await api('/tasks', { method: 'POST', body: JSON.stringify({ user_id, title }) });
    document.getElementById('task-title').value = '';
    toast(`Tâche "${title}" créée`);
    loadAll();
  } catch {
    toast('Erreur lors de la création', false);
  }
});

async function completeTask(id) {
  try {
    await api(`/tasks/${id}`, { method: 'PATCH' });
    toast('Tâche marquée comme terminée ✓');
    loadAll();
  } catch {
    toast('Erreur', false);
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ─────────────────────────────────────────────────
loadAll();
setInterval(loadAll, 10000); // rafraîchissement auto toutes les 10s
</script>
</body>
</html>
