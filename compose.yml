services:

  myapp:
    build: .
    ports:
      - "5001:5001"
    environment:
      - "UV_NO_DEV=0"
    depends_on:
      mysql:
        condition: service_healthy
    develop:
      watch:
        # Sync the working directory with the `/app` directory in the container
        - action: sync
          path: ./src
          target: /app/src
          # Exclude the project virtual environment
          ignore:
            - .venv/

        # Rebuild the image on changes to the `pyproject.toml`
        - action: rebuild
          path: ./pyproject.toml

        - action: rebuild
          path: ./uv.lock

  mysql:
    image: mysql:8.0
    container_name: demo-atlas-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: demo
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d

  atlas:
    image: arigaio/atlas:latest
    volumes:
      - .:/work
    working_dir: /work
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - atlas
    # Exemple d'utilisation : docker compose run --rm atlas migrate apply --env docker

volumes:
  mysql_data:
